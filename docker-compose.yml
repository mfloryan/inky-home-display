services:
  inky-display:
    build:
      context: .
      args:
        INSTALL_DEV: "false"
    volumes:
      - ./src:/code/src
      - ./out:/code/out
      - ./out/cache:/code/src/cache
      - ./pyproject.toml:/code/pyproject.toml
      - ./uv.lock:/code/uv.lock
    command: uv run src/update_display.py --png-only

  # Alternative service for running with different options
  inky-display-dev:
    build:
      context: .
      args:
        INSTALL_DEV: "true"
    volumes:
      - ./src:/code/src
      - ./tests:/code/tests
      - ./out:/code/out
      - ./out/cache:/code/src/cache
      - ./pyproject.toml:/code/pyproject.toml
      - ./uv.lock:/code/uv.lock
    # Override command when running: docker compose run inky-display-dev uv run src/update_display.py --png-only --output out/custom.png

  test:
    build:
      context: .
      args:
        INSTALL_DEV: "true"
    volumes:
      - ./src:/code/src
      - ./tests:/code/tests
      - ./out:/code/out
      - ./out/cache:/code/src/cache
      - ./pyproject.toml:/code/pyproject.toml
      - ./uv.lock:/code/uv.lock
    entrypoint: /bin/sh
    command: -c "uv run ruff check . && uv run pytest && uv run pytest --mpl --mpl-results-path=out/test-results -m manual tests/test_visual_regression.py -v"
