name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read

    steps:
    - uses: actions/checkout@v6

    - name: Set up system fonts and locales
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-terminus-otb fonts-ubuntu fonts-roboto locales
        sudo locale-gen pl_PL.UTF-8 en_GB.UTF-8

    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: "3.13"

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Lint with ruff
      run: uv run ruff check .

    - name: Test with pytest
      run: uv run pytest --cov=src --cov-report=term-missing --junitxml=test-results.xml

    - name: Visual regression tests
      run: |
        uv run pytest --mpl --mpl-results-path=out/test-results -m manual tests/test_visual_regression.py -v --junitxml=visual-results.xml

    - name: Surface Test Results
      uses: dorny/test-reporter@v3
      if: always()
      with:
        name: Pytest Results
        path: "*-results.xml"
        reporter: java-junit

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: test-results
        path: "*-results.xml"

    - name: Upload Visual Regression Diffs
      if: failure()
      uses: actions/upload-artifact@v6
      with:
        name: visual-regression-diffs
        path: out/test-results
